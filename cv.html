<script>
  (function () {
    var columnLabels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

    function setSideLabels(container, count) {
      var html = '';
      for (var i = 1; i <= count; i += 1) {
        html += '<span>' + i + '</span>';
      }
      container.innerHTML = html;
    }

    function setColumnLabels(container, labels, offsetX, coordCell) {
      var html = '';
      for (var i = 0; i < labels.length; i += 1) {
        var x = offsetX + ((i + 0.5) * coordCell);
        html += '<span style="left:' + x + 'px">' + labels[i] + '</span>';
      }
      container.innerHTML = html;
    }

    function syncCvMapCoords() {
      var sheet = document.querySelector('.sheet');
      var top = sheet && sheet.querySelector('.map-coords-top');
      var bottom = sheet && sheet.querySelector('.map-coords-bottom');
      var left = sheet && sheet.querySelector('.map-coords-left');
      var right = sheet && sheet.querySelector('.map-coords-right');
      if (!sheet || !top || !bottom || !left || !right) return;

      var coordCell = sheet.clientWidth / columnLabels.length;
      if (!Number.isFinite(coordCell) || coordCell <= 0) {
        coordCell = sheet.clientWidth / columnLabels.length;
      }
      if (!Number.isFinite(coordCell) || coordCell <= 0) return;

      var gridWidth = coordCell * columnLabels.length;
      var offsetX = (sheet.clientWidth - gridWidth) / 2;

      sheet.style.setProperty('--coord-cell', coordCell + 'px');
      sheet.style.setProperty('--coord-grid-offset-x', offsetX + 'px');

      var rowCount = Math.max(7, Math.floor(sheet.clientHeight / coordCell));
      sheet.style.setProperty('--coord-rows', String(rowCount));

      setColumnLabels(top, columnLabels, offsetX, coordCell);
      setColumnLabels(bottom, columnLabels, offsetX, coordCell);
      setSideLabels(left, rowCount);
      setSideLabels(right, rowCount);
    }

    var rafId = 0;
    function scheduleSync() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(syncCvMapCoords);
    }

    scheduleSync();
    window.addEventListener('load', scheduleSync);
    window.addEventListener('resize', scheduleSync);

    if ('ResizeObserver' in window) {
      var sheet = document.querySelector('.sheet');
      if (sheet) {
        var observer = new ResizeObserver(scheduleSync);
        observer.observe(sheet);
      }
    }
  })();
</script>
